<div class="terminal-box" id="main-container">
    <h1>PODDA-MD</h1>
    <div class="subtitle">ENCRYPTED_SESSION_GENERATOR</div>

    <input type="text" id="number" placeholder="947xxxxxxxx">
    
    <div id="btn-group">
        <button onclick="getPairCode()">GET_PAIR_CODE</button>
        <button onclick="getQR()" style="background: #fff; color: #000;">GET_QR_SCAN</button>
    </div>

    <div id="qr-box" style="display:none; margin-top: 20px;">
        <img id="qr-img" src="" style="border: 5px solid #fff; width: 200px;">
        <p style="font-size: 0.7em;">SCAN THIS WITH WHATSAPP</p>
    </div>

    <div id="pair-code-display"></div>
    <div id="status-msg">SYSTEM_READY_...</div>
</div>

<script>
    // QR එක ගන්න function එක
    async function getQR() {
        const qrBox = document.getElementById('qr-box');
        const qrImg = document.getElementById('qr-img');
        const statusMsg = document.getElementById('status-msg');
        
        statusMsg.innerText = "FETCHING_QR_CODE...";
        
        const interval = setInterval(async () => {
            const res = await fetch('/qr');
            const data = await res.json();
            if (data.qr) {
                qrImg.src = data.qr;
                qrBox.style.display = 'block';
                statusMsg.innerText = "QR_LOADED: SCAN NOW";
                clearInterval(interval);
            }
        }, 3000);
    }

    // Pairing function එක (කලින් එකමයි)
    async function getPairCode() {
        const num = document.getElementById('number').value;
        const statusMsg = document.getElementById('status-msg');
        const container = document.getElementById('main-container');
        try {
            const res = await fetch(`/pair?number=${num}`);
            const data = await res.json();
            if (res.ok && data.code) {
                document.getElementById('pair-code-display').innerText = data.code;
                document.getElementById('pair-code-display').style.display = 'block';
                statusMsg.innerText = "CODE_GENERATED!";
            } else { throw new Error(data.error); }
        } catch (e) {
            container.classList.add('error-state');
            statusMsg.innerText = "DENIED: " + e.message;
        }
    }
</script>
