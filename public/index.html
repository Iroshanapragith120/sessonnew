<!DOCTYPE html>
<html>
<head>
    <title>PODDA-MD TERMINAL</title>
    <style>
        body { 
            background: #000; color: #0f0; font-family: 'Courier New', monospace; 
            text-align: center; margin: 0; overflow-x: hidden;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('bg.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .main-box { border: 2px solid #0f0; display: inline-block; padding: 40px; margin-top: 50px; background: rgba(0, 20, 0, 0.85); box-shadow: 0 0 40px #0f0; border-radius: 20px; max-width: 90%; }
        h1 { font-size: 3.5em; letter-spacing: 12px; text-shadow: 0 0 20px #0f0; margin: 0; color: #0f0; }
        .input-group { margin-top: 25px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 250px; font-size: 1.1em; text-align: center; margin-bottom: 10px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 12px 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #qr-container { margin-top: 20px; display: none; }
        #qr-img { width: 220px; border: 3px solid #fff; }
        #status-msg { margin-top: 20px; color: #0ff; font-weight: bold; white-space: pre-wrap; }
        #pair-code-display { font-size: 2em; color: #fff; background: #002200; padding: 10px; margin-top: 15px; border: 2px dashed #0f0; display: none; letter-spacing: 5px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="main-box">
        <h1>PODDA-MD</h1>
        <div style="color:#fff; letter-spacing: 3px;">SESSION GENERATOR</div>
        
        <div class="input-group">
            <input type="text" id="number" placeholder="9477xxxxxxx (With Country Code)"><br>
            <button onclick="getPairCode()">GET PAIRING CODE</button>
            <button onclick="getQR()">SHOW QR CODE</button>
        </div>

        <div id="pair-code-display"></div>
        <div id="qr-container"><img id="qr-img" src=""></div>
        <div id="status-msg">READY_TO_INITIALIZE...</div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "20px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*10), i*20, y);
                if(y > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i] += 20;
            });
        }
        setInterval(drawMatrix, 50);

        async function getPairCode() {
            const num = document.getElementById('number').value;
            if(!num) return alert("Please enter number!");
            document.getElementById('status-msg').innerText = "REQUESTING_PAIR_CODE...";
            const res = await fetch(`/pair?number=${num}`);
            const data = await res.json();
            if(data.code) {
                const box = document.getElementById('pair-code-display');
                box.innerText = data.code;
                box.style.display = 'block';
                document.getElementById('status-msg').innerText = "ENTER THIS CODE IN YOUR WHATSAPP NOTIFICATION";
                startStatusCheck();
            }
        }

        async function getQR() {
            document.getElementById('status-msg').innerText = "GENERATING_QR...";
            setInterval(async () => {
                const res = await fetch('/qr');
                const data = await res.json();
                if(data.qr) {
                    document.getElementById('qr-container').style.display = 'block';
                    document.getElementById('qr-img').src = data.qr;
                    document.getElementById('status-msg').innerText = "SCAN_THIS_QR_WITH_WHATSAPP";
                }
            }, 3000);
            startStatusCheck();
        }

        function startStatusCheck() {
            setInterval(async () => {
                const res = await fetch('/status');
                const data = await res.json();
                if(data.id) {
                    document.body.innerHTML = `<div class="main-box"><h1>SUCCESS</h1><div id="status-msg" style="color:#fff">SESSION_ID_SENT_TO_YOUR_WHATSAPP!<br><br>${data.id}</div></div>`;
                }
            }, 4000);
        }
    </script>
</body>
</html>
